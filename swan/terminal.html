<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SWAN TERMINAL</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #000;
  color: #39ff88;
  font-family: monospace;
  overflow: hidden;
}

#log {
  position: fixed;
  top: 0;
  bottom: 40px;
  left: 0;
  right: 0;
  padding: 10px;
  white-space: pre-wrap;
}

#bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  padding: 6px 10px;
  border-top: 1px solid rgba(0,255,120,0.2);
}

#cursor {
  animation: blink 0.8s infinite;
  margin-right: 6px;
}

@keyframes blink {
  50% { opacity: 0; }
}

#input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #39ff88;
  font-family: monospace;
}
</style>
</head>

<body>

<div id="log">SYSTEM BOOTING...</div>

<div id="bar">
  <span id="cursor">█</span>
  <input id="input" autocomplete="off" autofocus />
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getDatabase,
  ref,
  update,
  onValue
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyByAJ_lafYdkTrNoTbs2V4m8-yOs1t8vwA",
  authDomain: "squirrelnews-53a89.firebaseapp.com",
  databaseURL: "https://squirrelnews-53a89-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "squirrelnews-53a89",
  storageBucket: "squirrelnews-53a89.appspot.com",
  messagingSenderId: "521720919624",
  appId: "1:521720919624:web:66e3b151eb4ef37ce7ca7d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const stateRef = ref(db, "swan/state");

const log = document.getElementById("log");
const input = document.getElementById("input");

const CODE = "4 8 15 16 23 42";

let state = {};
let endTime = null;
let syncedOnce = false;

/* 🛰 SYNC */
onValue(stateRef, (snap) => {
  const d = snap.val();
  if (!d) return;

  state = d;
  endTime = d.endTime ?? endTime;

  if (!syncedOnce) {
    syncedOnce = true;

    log.innerText = d.status === "active"
      ? "SYSTEM ONLINE"
      : "SYSTEM OFFLINE";
  }

  if (d.status === "failure") {
    log.innerText += "\nSYSTEM FAILURE";
  }
});

/* ⏱ remaining */
function getRemaining() {
  if (!endTime) return 0;
  return Math.max(0, Math.floor((endTime - Date.now()) / 1000));
}

/* ⌨️ INPUT */
input.addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;

  const v = input.value.trim();
  input.value = "";

  log.innerText += "\n█ " + v;

  /* 🔒 HIDDEN ADMIN: PAUSE */
  if (v === "sys.mag.process.stop") {

    if (!state.paused) {
      update(stateRef, {
        paused: true,
        pauseTime: Date.now()
      });
    }

    return; // no visible output
  }

  /* 🔒 HIDDEN ADMIN: RESUME */
  if (v === "sys.mag.process.resume") {

    if (state.paused && state.pauseTime && state.endTime) {

      const pausedDuration = Date.now() - state.pauseTime;

      update(stateRef, {
        paused: false,
        pauseTime: null,
        endTime: state.endTime + pausedDuration
      });
    }

    return; // no visible output
  }

  /* STATUS */
  if (v === "status") {
    log.innerText += "\nSTATE: " + (state.status || "unknown");
    return;
  }

  /* RESET */
  if (v === CODE) {

    const remaining = getRemaining();

    if (state.endTime && remaining > 240) {
      log.innerText += "\nENTRY RESTRICTED";
      return;
    }

    update(stateRef, {
      status: "active",
      endTime: Date.now() + (108 * 60 * 1000),
      paused: false,
      pauseTime: null
    });

    log.innerText += "\nSYSTEM RESET";
    return;
  }

  log.innerText += "\nINVALID ENTRY";
});
</script>

</body>
</html>
